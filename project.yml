# XcodeGen spec — generate the Xcode project with:  xcodegen generate
# Install XcodeGen:  brew install xcodegen
name: Nearhere
options:
  bundleIdPrefix: com.nearhere
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Nearhere:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Nearhere
        excludes:
          - "Config/Secrets.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nearhere.app
        INFOPLIST_FILE: Nearhere/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Nearhere/Resources/Nearhere.entitlements
    dependencies:
      - target: NearhereShareExtension
    entitlements:
      path: Nearhere/Resources/Nearhere.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nearhere.shared

  NearhereShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NearhereShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nearhere.app.ShareExtension
        INFOPLIST_FILE: NearhereShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: NearhereShareExtension/ShareExtension.entitlements
    entitlements:
      path: NearhereShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nearhere.shared

  NearhereTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NearhereTests
    dependencies:
      - target: Nearhere
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nearhere.app.Tests

schemes:
  Nearhere:
    build:
      targets:
        Nearhere: all
        NearhereTests: [test]
    test:
      targets:
        - NearhereTests
      gatherCoverageData: true
